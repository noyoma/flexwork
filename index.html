<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재량근무 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #171c2e;
    --border: #1e2640;
    --accent: #3d6bff;
    --accent2: #00d4aa;
    --warn: #ff6b35;
    --text: #e8eaf2;
    --text-dim: #6b7494;
    --text-mid: #a0aac0;
    --success: #00d4aa;
    --over: #ff6b35;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(61, 107, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61, 107, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--mono);
  }

  .quarter-selector {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quarter-selector select, .quarter-selector input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .quarter-selector select:hover, .quarter-selector input:hover {
    border-color: var(--accent);
  }

  /* Stats Dashboard */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .stat-card.accent2::before { background: var(--accent2); }
  .stat-card.warn::before { background: var(--warn); }
  .stat-card.neutral::before { background: var(--text-dim); }

  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-value span { font-size: 14px; color: var(--text-dim); margin-left: 4px; }
  .stat-value.positive { color: var(--accent2); }
  .stat-value.negative { color: var(--warn); }
  .stat-value.neutral { color: var(--text-mid); }

  .stat-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    font-family: var(--mono);
  }

  /* Progress Bar */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 32px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .progress-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }

  .progress-track {
    height: 10px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .progress-fill.over {
    background: linear-gradient(90deg, var(--accent), var(--warn));
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 100%;
    background: rgba(255,255,255,0.3);
    border-radius: 99px;
  }

  /* Calendar Grid */
  .calendar-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .month-nav button:hover { background: var(--accent); border-color: var(--accent); }

  .month-title {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    min-width: 100px;
    text-align: center;
  }

  .month-badge {
    font-size: 11px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-day-header {
    padding: 10px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  .cal-day-header.sun { color: #ff6b6b; }
  .cal-day-header.sat { color: #6b9fff; }

  .cal-cell {
    min-height: 80px;
    padding: 8px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { cursor: default; background: rgba(0,0,0,0.15); }
  .cal-cell:not(.empty):hover { background: var(--surface2); }

  .cal-cell.today { background: rgba(61, 107, 255, 0.07); }
  .cal-cell.today::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .cal-cell.weekend .day-num { color: #6b9fff; }
  .cal-cell.sunday .day-num { color: #ff6b6b; }

  .day-num {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 6px;
  }

  .day-hours {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .hours-badge {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    width: fit-content;
  }

  .hours-badge.full { background: rgba(0, 212, 170, 0.15); color: var(--accent2); }
  .hours-badge.partial { background: rgba(61, 107, 255, 0.15); color: var(--accent); }
  .hours-badge.over { background: rgba(255, 107, 53, 0.15); color: var(--warn); }
  .hours-badge.vacation { background: rgba(160, 170, 192, 0.15); color: var(--text-mid); }
  .hours-badge.minimum { background: rgba(255, 107, 53, 0.08); color: #ff9e7a; border: 1px dashed rgba(255, 107, 53, 0.3); }

  .day-status {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 400px;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.2s;
    position: relative;
  }

  .modal-overlay.active .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .modal-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .time-inputs {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }

  .time-sep { color: var(--text-dim); font-family: var(--mono); font-size: 18px; text-align: center; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .checkbox-row span {
    font-size: 13px;
    color: var(--text-mid);
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #5580ff; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .btn-danger {
    background: transparent;
    border: 1px solid rgba(255, 107, 53, 0.3);
    color: var(--warn);
    flex: 0;
    padding: 12px 16px;
  }

  .btn-danger:hover { background: rgba(255, 107, 53, 0.1); }

  .hours-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-mid);
  }

  .hours-preview strong {
    color: var(--accent2);
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 14px 18px;
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 24px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  /* Tooltip */
  .cal-cell .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .cal-cell:hover .tooltip { display: block; }

  /* Responsive */
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .cal-cell { min-height: 60px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">FlexWork · 재량근무 관리</div>
    <div class="quarter-selector">
      <input type="text" id="employeeName" placeholder="직원 이름" style="width:120px;">
      <select id="yearSelect"></select>
      <select id="quarterSelect">
        <option value="1">Q1 (1–3월)</option>
        <option value="2">Q2 (4–6월)</option>
        <option value="3">Q3 (7–9월)</option>
        <option value="4">Q4 (10–12월)</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">분기 필수 근무시간</div>
      <div class="stat-value" id="requiredHours">—<span>h</span></div>
      <div class="stat-sub" id="workingDaysInfo">—</div>
    </div>
    <div class="stat-card accent2">
      <div class="stat-label">실제 근무시간</div>
      <div class="stat-value" id="actualHours">0<span>h</span></div>
      <div class="stat-sub" id="actualDaysInfo">입력일수: 0일</div>
    </div>
    <div class="stat-card warn" id="diffCard">
      <div class="stat-label">잔여 / 초과</div>
      <div class="stat-value" id="diffHours">—<span>h</span></div>
      <div class="stat-sub" id="diffLabel">—</div>
    </div>
    <div class="stat-card neutral">
      <div class="stat-label">오늘까지 목표</div>
      <div class="stat-value" id="targetToday">—<span>h</span></div>
      <div class="stat-sub" id="todayStatus">—</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-title">분기 달성률</div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(0,212,170,0.5)"></div> 8h (기준 충족)</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(61,107,255,0.5)"></div> 4–7h (최소 충족)</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,107,53,0.12);border:1px dashed rgba(255,107,53,0.5)"></div> 4h 미만</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,107,53,0.5)"></div> 8h 초과</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(160,170,192,0.3)"></div> 휴가</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,158,122,0.3);border:1px solid rgba(255,107,53,0.3)"></div> 공휴일 (근무일 제외)</div>
  </div>

  <!-- Calendar -->
  <div id="calendarContainer"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">근무시간 입력</div>
    <div class="modal-date" id="modalDate"></div>

    <div id="vacationToggleGroup" class="form-group">
      <label class="checkbox-row">
        <input type="checkbox" id="isVacation" onchange="toggleVacation()">
        <span>휴가 처리 (근무 없음)</span>
      </label>
    </div>

    <div id="timeInputGroup">
      <div class="form-group">
        <label class="form-label">근무 시작 / 종료</label>
        <div class="time-inputs">
          <input type="time" class="form-input" id="startTime" value="09:00" oninput="updatePreview()">
          <div class="time-sep">~</div>
          <input type="time" class="form-input" id="endTime" value="18:00" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">휴게시간 (분)</label>
        <input type="number" class="form-input" id="breakTime" value="60" min="0" max="180" oninput="updatePreview()">
      </div>
      <div class="hours-preview" id="hoursPreview">
        실 근무시간: <strong>8.0시간</strong>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteEntry()" id="deleteBtn" style="display:none">삭제</button>
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

function isHoliday(y, m, d) {
  return KR_HOLIDAYS[dateKey(y, m, d)] || null;
}

function isNonWorkday(dt) {
  const y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
  return isWeekend(dt) || !!isHoliday(y, m, d);
}

// ───── State ─────
let state = {
  year: new Date().getFullYear(),
  quarter: Math.ceil((new Date().getMonth() + 1) / 3),
  viewMonth: new Date().getMonth(),
  data: JSON.parse(localStorage.getItem('flexwork_data') || '{}'),
  selectedDate: null,
  employeeName: localStorage.getItem('flexwork_name') || ''
};

// ───── Init ─────
function init() {
  const yearSel = document.getElementById('yearSelect');
  const y = new Date().getFullYear();
  for (let i = y - 2; i <= y + 1; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i + '년';
    if (i === y) opt.selected = true;
    yearSel.appendChild(opt);
  }
  yearSel.value = state.year;
  document.getElementById('quarterSelect').value = state.quarter;
  document.getElementById('employeeName').value = state.employeeName;

  yearSel.addEventListener('change', e => { state.year = +e.target.value; updateAll(); });
  document.getElementById('quarterSelect').addEventListener('change', e => {
    state.quarter = +e.target.value;
    state.viewMonth = (state.quarter - 1) * 3;
    updateAll();
  });
  document.getElementById('employeeName').addEventListener('input', e => {
    state.employeeName = e.target.value;
    localStorage.setItem('flexwork_name', state.employeeName);
  });

  state.viewMonth = (state.quarter - 1) * 3;
  updateAll();
}

// ───── Helpers ─────
function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }
function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseTime(str) { const [h, m] = str.split(':').map(Number); return h * 60 + m; }

function getWorkingDays(year, quarter) {
  const startMonth = (quarter - 1) * 3;
  let count = 0;
  for (let m = startMonth; m < startMonth + 3; m++) {
    const days = new Date(year, m + 1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const dt = new Date(year, m, d);
      if (!isNonWorkday(dt)) count++;
    }
  }
  return count;
}

function getWorkingDaysUntilToday(year, quarter) {
  const today = new Date();
  const startMonth = (quarter - 1) * 3;
  const endMonth = startMonth + 2;
  const quarterEnd = new Date(year, endMonth + 1, 0);
  const cutoff = today < quarterEnd ? today : quarterEnd;
  let count = 0;
  for (let m = startMonth; m <= endMonth; m++) {
    const days = new Date(year, m + 1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const dt = new Date(year, m, d);
      if (dt > cutoff) break;
      if (!isNonWorkday(dt)) count++;
    }
  }
  return count;
}

function calcHours(entry) {
  if (!entry || entry.vacation) return 0;
  const start = parseTime(entry.start);
  const end = parseTime(entry.end);
  const worked = Math.max(0, end - start - (entry.break || 60));
  return +(worked / 60).toFixed(2);
}

// ───── Stats Update ─────
function updateStats() {
  const workDays = getWorkingDays(state.year, state.quarter);
  const requiredTotal = workDays * 7; // 8h - 1h break
  const startMonth = (state.quarter - 1) * 3;

  let totalActual = 0, inputDays = 0;
  for (let m = startMonth; m < startMonth + 3; m++) {
    const days = new Date(state.year, m + 1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const key = dateKey(state.year, m, d);
      if (state.data[key]) {
        if (!state.data[key].vacation) {
          totalActual += calcHours(state.data[key]);
          inputDays++;
        }
      }
    }
  }

  const diff = totalActual - requiredTotal;
  const pct = Math.min((totalActual / requiredTotal) * 100, 110);
  const workDaysToday = getWorkingDaysUntilToday(state.year, state.quarter);
  const targetToday = workDaysToday * 7;

  document.getElementById('requiredHours').innerHTML = `${requiredTotal}<span>h</span>`;
  document.getElementById('workingDaysInfo').textContent = `영업일 ${workDays}일 × 7h`;
  document.getElementById('actualHours').innerHTML = `${totalActual.toFixed(1)}<span>h</span>`;
  document.getElementById('actualDaysInfo').textContent = `입력일수: ${inputDays}일`;

  const diffEl = document.getElementById('diffHours');
  const diffLabel = document.getElementById('diffLabel');
  const diffCard = document.getElementById('diffCard');

  if (diff >= 0) {
    diffEl.innerHTML = `+${diff.toFixed(1)}<span>h</span>`;
    diffEl.className = 'stat-value positive';
    diffLabel.textContent = '필수시간 초과 (조정수당 미지급)';
    diffCard.querySelector('::before');
  } else {
    diffEl.innerHTML = `${diff.toFixed(1)}<span>h</span>`;
    diffEl.className = 'stat-value negative';
    diffLabel.textContent = '잔여 필수 근무시간';
  }

  document.getElementById('targetToday').innerHTML = `${targetToday}<span>h</span>`;
  const todayDiff = totalActual - targetToday;
  const todayEl = document.getElementById('todayStatus');
  if (todayDiff >= 0) {
    todayEl.textContent = `목표 대비 +${todayDiff.toFixed(1)}h`;
    document.getElementById('targetToday').className = 'stat-value positive';
  } else {
    todayEl.textContent = `목표 대비 ${todayDiff.toFixed(1)}h`;
    document.getElementById('targetToday').className = 'stat-value negative';
  }

  document.getElementById('progressPct').textContent = `${Math.round((totalActual / requiredTotal) * 100)}%`;
  const fill = document.getElementById('progressFill');
  fill.style.width = `${Math.min(pct, 100)}%`;
  fill.className = 'progress-fill' + (totalActual > requiredTotal ? ' over' : '');
}

// ───── Calendar Render ─────
function renderCalendar() {
  const container = document.getElementById('calendarContainer');
  container.innerHTML = '';
  const today = new Date();
  const startMonth = (state.quarter - 1) * 3;

  for (let mi = 0; mi < 3; mi++) {
    const m = startMonth + mi;
    const monthName = new Date(state.year, m, 1).toLocaleDateString('ko-KR', { month: 'long' });
    const daysInMonth = new Date(state.year, m + 1, 0).getDate();
    const firstDay = new Date(state.year, m, 1).getDay();

    const section = document.createElement('div');
    section.className = 'calendar-section';
    section.style.marginBottom = '16px';

    // Header
    const header = document.createElement('div');
    header.className = 'calendar-header';
    header.innerHTML = `
      <div class="month-nav">
        <div class="month-title">${state.year}년 ${monthName}</div>
      </div>
      <div class="month-badge">Q${state.quarter} · ${mi + 1}/3</div>
    `;
    section.appendChild(header);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    const days = ['일','월','화','수','목','금','토'];
    days.forEach((d, i) => {
      const h = document.createElement('div');
      h.className = 'cal-day-header' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
      h.textContent = d;
      grid.appendChild(h);
    });

    // Empty cells
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      grid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(state.year, m, d);
      const key = dateKey(state.year, m, d);
      const entry = state.data[key];
      const isToday = dt.toDateString() === today.toDateString();
      const isFuture = dt > today;
      const weekend = isWeekend(dt);
      const holidayName = isHoliday(state.year, m, d);
      const nonWorkday = weekend || !!holidayName;

      const cell = document.createElement('div');
      let cls = 'cal-cell';
      if (weekend) cls += dt.getDay() === 0 ? ' sunday' : ' weekend';
      if (holidayName && !weekend) cls += ' sunday'; // 공휴일도 빨간색
      if (isToday) cls += ' today';
      cell.className = cls;

      // 날짜 숫자
      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = d;
      cell.appendChild(dayNum);

      // 공휴일 이름 표시
      if (holidayName) {
        const hLabel = document.createElement('div');
        hLabel.style.cssText = 'font-size:9px;color:#ff9e7a;line-height:1.2;margin-bottom:2px;word-break:keep-all;';
        hLabel.textContent = holidayName;
        cell.appendChild(hLabel);
      }

      if (entry) {
        const hoursDiv = document.createElement('div');
        hoursDiv.className = 'day-hours';

        if (entry.vacation) {
          const badge = document.createElement('span');
          badge.className = 'hours-badge vacation';
          badge.textContent = '휴가';
          hoursDiv.appendChild(badge);
        } else {
          const h = calcHours(entry);
          const badge = document.createElement('span');
          if (h > 8) badge.className = 'hours-badge over';
          else if (h >= 8) badge.className = 'hours-badge full';
          else if (h >= 4) badge.className = 'hours-badge partial';
          else badge.className = 'hours-badge minimum';
          badge.textContent = `${h.toFixed(1)}h`;
          hoursDiv.appendChild(badge);

          const status = document.createElement('div');
          status.className = 'day-status';
          status.textContent = `${entry.start} ~ ${entry.end}`;
          hoursDiv.appendChild(status);
        }
        cell.appendChild(hoursDiv);
      } else if (!nonWorkday && !isFuture) {
        const missing = document.createElement('div');
        missing.className = 'day-status';
        missing.style.color = 'rgba(255,107,53,0.4)';
        missing.style.fontSize = '10px';
        missing.style.marginTop = '2px';
        missing.textContent = '미입력';
        cell.appendChild(missing);
      }

      if (!nonWorkday) {
        cell.addEventListener('click', () => openModal(state.year, m, d));
      }

      grid.appendChild(cell);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ───── Modal ─────
function openModal(y, m, d) {
  const dt = new Date(y, m, d);
  const today = new Date(); today.setHours(23, 59, 59, 999);
  if (dt > today) return; // 미래 입력 불가

  const key = dateKey(y, m, d);
  const entry = state.data[key];
  state.selectedDate = key;

  document.getElementById('modalTitle').textContent = '근무시간 입력';
  document.getElementById('modalDate').textContent =
    dt.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  const isVac = document.getElementById('isVacation');
  isVac.checked = entry?.vacation || false;

  document.getElementById('startTime').value = entry?.start || '09:00';
  document.getElementById('endTime').value = entry?.end || '18:00';
  document.getElementById('breakTime').value = entry?.break ?? 60;

  document.getElementById('deleteBtn').style.display = entry ? 'block' : 'none';

  toggleVacation();
  updatePreview();
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  state.selectedDate = null;
}

function toggleVacation() {
  const vac = document.getElementById('isVacation').checked;
  document.getElementById('timeInputGroup').style.display = vac ? 'none' : 'block';
}

function updatePreview() {
  const s = document.getElementById('startTime').value;
  const e = document.getElementById('endTime').value;
  const b = +document.getElementById('breakTime').value;
  if (!s || !e) return;
  const start = parseTime(s), end = parseTime(e);
  const worked = Math.max(0, end - start - b);
  const h = (worked / 60).toFixed(1);
  const el = document.getElementById('hoursPreview');
  el.innerHTML = `실 근무시간: <strong>${h}시간</strong>`;
  if (+h < 4) el.innerHTML += ' <span style="color:var(--warn);font-size:11px">⚠ 최소 4시간 미만</span>';
  else if (+h === 8) el.innerHTML += ' <span style="color:var(--accent2);font-size:11px">✓ 기준 충족</span>';
  else if (+h > 8) el.innerHTML += ' <span style="color:var(--warn);font-size:11px">초과 (조정수당 미지급)</span>';
}

function saveEntry() {
  if (!state.selectedDate) return;
  const vac = document.getElementById('isVacation').checked;
  if (vac) {
    state.data[state.selectedDate] = { vacation: true };
  } else {
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const brk = +document.getElementById('breakTime').value;
    state.data[state.selectedDate] = { start, end, break: brk };
  }
  localStorage.setItem('flexwork_data', JSON.stringify(state.data));
  closeModal();
  updateAll();
}

function deleteEntry() {
  if (!state.selectedDate) return;
  delete state.data[state.selectedDate];
  localStorage.setItem('flexwork_data', JSON.stringify(state.data));
  closeModal();
  updateAll();
}

function updateAll() {
  updateStats();
  renderCalendar();
}

// Click outside to close
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

init();
</script>

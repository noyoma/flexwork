<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA 성과 및 업무 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text2: #9ca3b0; --text3: #5c6275;
  --accent: #5b7cff; --accent2: #7b9aff;
  --orange: #ff6b00;
  --green: #22c55e; --red: #ef4444;
  --color-기획홍보팀: #ff9f0a; --color-대외정책팀: #ffd60a;
  --color-차트운영팀: #ff375f; --color-개발파트: #bf5af2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 24px; width: 380px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }

/* SVG 로고 (ce72a7 원본 디자인 복제) */
.kpia-logo-svg { width: 105px; height: auto; display: block; margin: 0 auto 12px; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -1px; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }

/* 사이드바 아코디언 */
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
.logo-section { padding: 30px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; margin-top: 5px; }

.nav { padding: 10px 0; flex: 1; overflow-y: auto; }
.nav-group { margin-bottom: 4px; }
.nav-group-header { 
  padding: 14px 20px; font-size: 12px; font-weight: 900; color: var(--text3); 
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  background: rgba(255,255,255,0.02); transition: 0.2s; border-bottom: 1px solid var(--border);
}
.nav-group-header:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.nav-group-header i { font-style: normal; font-size: 10px; transition: transform 0.3s; }
.nav-group.closed .nav-group-content { display: none; }
.nav-group.closed .nav-group-header i { transform: rotate(-90deg); }

.nav-item { 
  display: flex; align-items: center; gap: 10px; padding: 12px 25px; 
  font-size: 13px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; 
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(91,124,255,0.1); color: var(--accent2); border-left-color: var(--accent); font-weight: 700; }

/* 상단바 */
.topbar { 
  padding: 15px 30px; border-bottom: 1px solid var(--border); 
  display: grid; grid-template-columns: 1.2fr auto 1.2fr; align-items: center; 
  background: var(--bg); position: sticky; top: 0; z-index: 100; 
}
.topbar h2 { font-size: 16px; font-weight: 800; color: var(--text); white-space: nowrap; }
.date-selectors { display: flex; gap: 10px; position: relative; justify-content: center; }
.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 15px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text); }

/* 월 배지 디자인 */
.month-badge { font-size: 10px; color: var(--accent2); font-weight: 800; margin-left: 8px; padding: 2px 6px; background: rgba(91,124,255,0.15); border-radius: 4px; border: 1px solid rgba(91,124,255,0.2); vertical-align: middle; }

/* 컨텐츠 공통 */
.content { padding: 25px 30px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; overflow: hidden; }
.panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 800; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

/* 로그 상세 스타일 */
.log-item { background: var(--bg3); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--text3); border: 1px solid var(--border); }
.log-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.log-tag { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
.tag-등록 { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-수정 { background: rgba(91,124,255,0.15); color: var(--accent2); }
.tag-삭제 { background: rgba(239,68,68,0.15); color: var(--red); }
.log-detail-box { background: rgba(0,0,0,0.25); border-radius: 8px; padding: 12px; white-space: pre-wrap; color: var(--text2); font-size: 12px; line-height: 1.8; }
.log-diff-label { color: var(--orange); font-weight: 800; font-size: 11px; display: block; }

/* 테이블 규격 */
.kpi-table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 850px; }
.kpi-table th, .kpi-table td { padding: 14px 10px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: center; word-break: keep-all; }
.col-item { text-align: left !important; width: 160px; }

.tracking-card { background: var(--bg3); border-radius: 10px; padding: 20px; margin-bottom: 10px; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s; }
.tracking-card:hover { transform: translateX(5px); background: #252a40; }
.tracking-card.locked { cursor: default; opacity: 0.6; border-left-style: dotted; }

.history-team-btn { padding: 18px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
.history-team-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(5px); }
.modal { background: var(--bg2); width: 620px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.5); overflow: hidden; }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); margin-bottom: 15px; outline: none; }
.btn-reg { background: var(--accent); color: white; padding: 7px 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 11px; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">

    <div style="font-size:16px; font-weight:900; margin-bottom:25px; color:var(--text); letter-spacing: 1px;">MANAGEMENT SYSTEM LOGIN</div>
    <input type="text" id="login-id" class="modal-input" placeholder="ID">

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">

      <div class="nav">
        <div class="nav-group" id="group-kpi">

    </nav>

    <div class="main">
      <div class="topbar">

        <div class="date-selectors" id="date-controls">
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div>
            <div id="year-grid" class="selector-grid-popup" style="position: absolute; top: 45px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 1000; width: 260px;"></div>
          </div>
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div>
            <div id="month-grid" class="selector-grid-popup" style="position: absolute; top: 45px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 1000; width: 260px;"></div>
          </div>
        </div>
        <div></div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:18px 25px;">
      <h3 id="modal-title" style="font-size:16px;">데이터 입력/수정</h3>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:24px;">✕</button>
    </div>
    <div class="modal-body" style="padding:28px;">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">

        <div><label id="label-team-type" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">분류</label><select id="f-team" class="modal-input" style="margin-bottom:0;" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:25px;">

        <select id="f-kpi" class="modal-input" style="margin-bottom:0; border:1px solid var(--accent); font-weight:700; color:var(--accent2);"></select>
      </div>
      <div style="margin-bottom:25px;"><label id="label-last" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">실적</label><textarea id="f-last" class="modal-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div style="margin-bottom:25px;"><label id="label-this" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">계획</label><textarea id="f-this" class="modal-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:12px;">
        <button class="btn-reg" style="flex:2; padding:16px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:800; cursor:pointer;" onclick="saveData()">SAVE CHANGES</button>
        <button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">DELETE</button>
      </div>
      <div id="lock-msg" style="display:none; color:var(--red); font-size:13px; font-weight:700; text-align:center;">마감된 월은 수정이 불가합니다.</div>
    </div>
  </div>
</div>

<script>

const _0xV1 = [108, 119, 110, 102, 88, 108, 119, 110];
const _0xV2 = [108, 119, 110, 53, 55, 53, 49, 38]; 
const _0xM = (a) => a.map(v => String.fromCharCode(v ^ 0x07)).join('');

function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === _0xM(_0xV1) && p === _0xM(_0xV2)) { sessionStorage.setItem('k_uid', i); sessionStorage.setItem('k_token_v3', btoa(Date.now())); checkAuth(); } else { alert("인증 실패"); }
}

let currentYear = 2026, currentMonth = new Date().getMonth();
let currentView = 'tracking', currentCategory = 'kpi', currentHistoryTeam = KPI_TEAMS[0];
let db = JSON.parse(localStorage.getItem('k_combined_db') || '[]');
let logs = JSON.parse(localStorage.getItem('k_combined_logs') || '[]');

const rNow = new Date(), rY = rNow.getFullYear(), rM = rNow.getMonth();

function toggleNavGroup(id) { document.getElementById(id).classList.toggle('closed'); }

function addHistoryLog(action, category, team, item, details) {
  const now = new Date(), uid = sessionStorage.getItem('k_uid') || 'Admin';
  const time = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.unshift({ time, action, category: category.toUpperCase(), team, item, details, user: uid });
  localStorage.setItem('k_combined_logs', JSON.stringify(logs));
}

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'); yg.innerHTML = "";
  for(let y=2024; y<=2030; y++) {
    const d = document.createElement('div'); d.className=`grid-item ${y===currentYear?'active':''}`; d.textContent=y+"년";
    d.onclick=(e)=>{e.stopPropagation();currentYear=y;updateDateDisplays();render();}; yg.appendChild(d);
  }
  document.getElementById('month-grid').innerHTML = MONTHS.map((m,i)=>`<div class="grid-item ${i===currentMonth?'active':''}" onclick="event.stopPropagation();currentMonth=${i};updateDateDisplays();render();">${m}</div>`).join('');
}

function showView(view, category) {
  currentView = view; currentCategory = category;
  currentHistoryTeam = (category === 'kpi' ? KPI_TEAMS[0] : TASK_TEAMS[0]);
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById(`m-${category}-${view}`); if(btn) btn.classList.add('active');
  const prefix = category === 'kpi' ? '[KPI]' : '[주요업무]';
  const titles = { 'tracking':'월별 트래킹', 'history':'연간 누적 현황', 'kpilist':'지표 가이드', 'logs':'변경 로그' };
  document.getElementById('page-title').innerHTML = `${prefix} ${titles[view]}`;
  document.getElementById('date-controls').style.display = (view === 'tracking') ? 'flex' : 'none';
  render();
}

function render() {
  if (!sessionStorage.getItem('k_v2_token')) return;
  const container = document.getElementById('main-content');
  const isPast = (currentYear < rY) || (currentYear === rY && currentMonth < rM);
  const dataList = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL);
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);

  if (currentView === 'logs') {
    const filtered = logs.filter(l => l.category === currentCategory.toUpperCase());
    container.innerHTML = filtered.length > 0 ? filtered.map(l => `
      <div class="log-item"><div class="log-header"><div><span class="log-tag tag-${l.action}">${l.action}</span> <span style="color:var(--text3); font-size:11px; margin-left:10px;">${l.time}</span></div><span class="log-user">UID: ${l.user}</span></div>
      <div style="font-weight:800; font-size:14px; margin: 10px 0; color:var(--text);">${l.team} - ${l.item}</div><div class="log-detail-box">${l.details}</div></div>`).join('') : '<div style="text-align:center; padding:100px; color:var(--text3);">변경 기록이 없습니다.</div>';
    return;
  }

  if (currentView === 'kpilist') {
    container.innerHTML = KPI_TEAMS.map(team => `
      <div class="panel"><div class="panel-header"><strong>${team} 지표 가이드</strong></div><div class="panel-body" style="overflow-x:auto;">
      <table class="kpi-table"><thead><tr><th style="width:160px;">항목</th><th style="width:60px;">가중치</th><th>목표</th><th>S</th><th>A</th><th>B</th><th>C</th></tr></thead>
      <tbody>${KPI_DATA_FULL[team].map(k => `<tr><td style="font-weight:700; text-align:left;">${k.item}</td><td style="color:var(--orange); font-weight:700;">${Math.round(k.weight*100)}%</td><td style="text-align:left;">${k.goal}</td><td>${k.s}</td><td>${k.a}</td><td>${k.b}</td><td>${k.c}</td></tr>`).join('')}</tbody></table>
      </div></div>`).join('');
    return;
  }

  if (currentView === 'history') {
    let html = `<div style="max-width: 1100px; margin: 0 auto;"><div class="history-team-grid">${teams.map(t => `<div class="history-team-btn ${t === currentHistoryTeam ? 'active' : ''}" onclick="currentHistoryTeam='${t}';render();">${t}</div>`).join('')}</div>`;
    for(let m = 0; m < 12; m++) {
      const historyData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === m && d.team === currentHistoryTeam);
      if(historyData.length > 0) {
        html += `<div style="border-left:3px solid var(--orange); padding-left:25px; margin-bottom:40px;"><h3 style="color:var(--orange); margin-bottom:20px; font-size:18px; font-weight:900;">${MONTHS[m]} <span class="month-badge">RECORD</span></h3><div class="grid-2">${historyData.map(d => `
          <div class="panel"><div class="panel-header" style="border-bottom:none; font-size:13px; color:var(--accent2);">${d.item}</div><div class="panel-body" onclick="${(currentYear < rY || (currentYear === rY && m < rM)) ? '' : `openModal('${d.id}')`}" style="cursor:pointer; padding:0 20px 20px;">
          <div style="margin-bottom:12px;"><div style="font-size:11px; color:var(--green); font-weight:700; margin-bottom:5px;">✓ 실적</div><div style="font-size:13px; line-height:1.6;">${d.lastDone}</div></div>
          <div><div style="font-size:11px; color:var(--accent); font-weight:700; margin-bottom:5px;">→ 계획</div><div style="font-size:13px; line-height:1.6;">${d.thisPlan}</div></div></div></div>`).join('')}</div></div>`;
      }
    }
    container.innerHTML = html + "</div>";
    return;
  }

  const monthData = db.filter(d => d.type === currentCategory && d.year === currentYear && d.month === currentMonth);
  container.innerHTML = `<div class="grid-2">${teams.map(team => `
    <div class="panel" style="border-top: 3px solid var(--color-${team} || var(--accent));">
      <div class="panel-header"><span>${team} <span class="month-badge">${MONTHS[currentMonth]}</span></span><button class="btn-reg" onclick="openModal(null, '${team}')">+ 등록</button></div>
      <div class="panel-body">
        ${dataList[team].map(k => {
          const entry = monthData.find(d => d.team === team && d.item === k.item);
          return `<div class="tracking-card ${isPast ? 'locked' : ''}" onclick="${isPast ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}')`}">
            <div style="font-size:13px; font-weight:900; color:var(--accent2); margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:6px;">${k.item} ${k.owner ? `<span style="font-weight:400; font-size:10px; color:var(--text3); float:right;">[${k.owner}]</span>` : ''}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; font-size:12px;">
              <div><span style="color:var(--green); font-weight:700; display:block; margin-bottom:4px;">${currentMonth === 0 ? '12월' : currentMonth + '월'} 실적:</span>${entry?entry.lastDone:'-'}</div>
              <div><span style="color:var(--accent); font-weight:700; display:block; margin-bottom:4px;">${MONTHS[currentMonth]} 계획:</span>${entry?entry.thisPlan:'-'}</div>
            </div></div>`;
        }).join('')}</div></div>`).join('')}</div>`;
}

function openModal(id = null, teamHint = null, itemHint = null) {
  const fMonth = document.getElementById('f-month'), fTeam = document.getElementById('f-team');
  const footer = document.getElementById('modal-footer'), lockMsg = document.getElementById('lock-msg');
  const teams = (currentCategory === 'kpi' ? KPI_TEAMS : TASK_TEAMS);
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('label-team-type').textContent = (currentCategory === 'kpi' ? '팀명' : '분류');
  document.getElementById('label-item-type').textContent = (currentCategory === 'kpi' ? '연계 KPI 항목' : '업무 항목');

  if (id && id !== '') {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.item;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = currentMonth; fTeam.value = teamHint || teams[0];
    updateKpiOptions(); if(itemHint) document.getElementById('f-kpi').value = itemHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  const isLocked = (currentYear < rY) || (currentYear === rY && parseInt(fMonth.value) < rM);
  footer.style.display = isLocked ? 'none' : 'flex'; lockMsg.style.display = isLocked ? 'block' : 'none';
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() { const m = parseInt(document.getElementById('f-month').value); document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 실적`; document.getElementById('label-this').innerHTML = `${MONTHS[m]} 계획`; }
function updateKpiOptions() { const t = document.getElementById('f-team').value; const list = (currentCategory === 'kpi' ? KPI_DATA_FULL : TASK_DATA_FULL); document.getElementById('f-kpi').innerHTML = list[t].map(k => `<option value="${k.item}">${k.item}</option>`).join(''); }

function saveData() {
  const id = document.getElementById('f-id').value, team = document.getElementById('f-team').value, kpi = document.getElementById('f-kpi').value;
  const last = document.getElementById('f-last').value, plan = document.getElementById('f-this').value, m = parseInt(document.getElementById('f-month').value);
  const old = db.find(x => String(x.id) === String(id));
  if (old) {
    let diff = "";
    if(old.lastDone !== last) diff += `<span class="log-diff-label">[실적 변경]</span> ${old.lastDone} → ${last}\n`;
    if(old.thisPlan !== plan) diff += `<span class="log-diff-label">[계획 변경]</span> ${old.thisPlan} → ${plan}`;
    addHistoryLog('수정', currentCategory, team, kpi, diff || "변경사항 없음");
  } else {
    addHistoryLog('등록', currentCategory, team, kpi, `[초기] 실적: ${last} / 계획: ${plan}`);
  }
  const entry = { id: id || Date.now(), type: currentCategory, year: currentYear, month: m, team, item: kpi, lastDone: last, thisPlan: plan };
  db = db.filter(d => String(d.id) !== String(entry.id)); db.push(entry);
  localStorage.setItem('k_combined_db', JSON.stringify(db));
  currentMonth = m; updateDateDisplays(); closeModal(); render();
}

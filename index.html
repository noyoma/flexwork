<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-MCA KPI 성과 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121212; --bg2: #1a1a1a; --bg3: #242424;
  --surface: #2a2a2a; --border: rgba(255,255,255,0.08);
  --text: #ffffff; --text2: #b0b0b0; --text3: #707070;
  --accent: #ff6b00; --accent2: #ff8533;
  --green: #4cd964; --red: #ff3b30;
  --color-기획홍보: #ff9f0a; --color-대외정책: #ffd60a;
  --color-차트운영: #ff375f; --color-개발파트: #bf5af2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인/사이드바 등 기존 스타일 유지 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 360px; text-align: center; }
.login-logo { width: 180px; margin-bottom: 30px; filter: brightness(0) invert(1); }
.login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); margin-bottom: 12px; outline: none; }
.btn-login { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }
#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.logo-section { padding: 30px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.kmca-logo { width: 100%; max-width: 180px; filter: brightness(0) invert(1); }
.system-name { font-size: 13px; font-weight: 700; color: var(--accent); margin-top: 10px; letter-spacing: 1px; }
.nav { padding: 20px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 24px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
.nav-item.active { background: rgba(255,107,0,0.1); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }

/* 네비게이션 개선 스타일 */
.topbar { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 10; }
.selector-group { display: flex; align-items: center; gap: 10px; }
.selector-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: center; padding: 2px 8px; }
.selector-item button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 18px; padding: 4px 8px; }
.selector-select { background: none; border: none; color: var(--text); font-family: inherit; font-size: 14px; font-weight: 700; outline: none; cursor: pointer; padding: 4px 5px; text-align: center; -webkit-appearance: none; }

/* 패널/로그카드 스타일 */
.content { padding: 24px 28px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; }
.panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.log-card { background: var(--bg3); border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--accent); cursor: pointer; }
.log-text { font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; }
.kpi-tag { display: inline-block; padding: 3px 10px; background: rgba(255,107,0,0.15); border-radius: 4px; font-size: 11px; color: var(--accent2); font-weight: 600; margin-top: 10px; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
.btn-primary { background: var(--accent); color: white; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1100; backdrop-filter: blur(5px); }
.modal { background: var(--bg2); width: 580px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: var(--bg3); }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
.form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: inherit; outline: none; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img src="https://www.k-mca.or.kr/images/common/logo.png" class="login-logo" alt="K-MCA">
    <div class="system-name" style="margin-bottom: 24px;">KPI PERFORMANCE SYSTEM</div>
    <input type="text" id="login-id" class="login-input" placeholder="ID">
    <input type="password" id="login-pw" class="login-input" placeholder="PASSWORD">
    <button class="btn-login" onclick="handleLogin()">ENTER</button>
    <div id="login-error" style="color:var(--red); font-size:12px; margin-top:15px; display:none;">인증 정보가 일치하지 않습니다.</div>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <img src="https://www.k-mca.or.kr/images/common/logo.png" class="kmca-logo" alt="K-MCA">
        <div class="system-name">KPI TRACKER</div>
        <button class="btn btn-primary" style="font-size:10px; margin-top:10px;" onclick="downloadSelf()">💾 파일 내보내기</button>
      </div>
      <div class="nav">
        <div id="m-input" class="nav-item active" onclick="showView('input')">✍ 실적-계획 입력</div>
        <div id="m-log" class="nav-item" onclick="showView('log')">📋 팀별 로그 현황</div>
        <div id="m-history" class="nav-item" onclick="showView('history')">📅 연간 누적 트래킹</div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 30px; color: var(--red); opacity: 0.7;">🔓 시스템 로그아웃</div>
      </div>
    </nav>

    <div class="main">
      <div class="topbar">
        <h2 id="page-title" style="font-size: 20px; font-weight: 700;">월별 실적-계획 입력</h2>
        <div class="selector-group">
          <div class="selector-item">
            <button onclick="changeYear(-1)">‹</button>
            <select id="year-select" class="selector-select" onchange="setYear(this.value)"></select>
            <button onclick="changeYear(1)">›</button>
          </div>
          <div class="selector-item" id="top-month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <select id="month-select" class="selector-select" onchange="setMonth(this.value)"></select>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div id="top-team-filter" style="display:none;">
          <select id="history-team-select" class="form-select" onchange="render()"></select>
        </div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title" style="font-size: 16px; color: var(--accent);">업무 레코드 등록</h3>
      <button onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
        <div>
          <label class="form-label">트래킹 월</label>
          <select id="f-month" class="form-select" onchange="updateModalLabels()"></select>
        </div>
        <div>
          <label class="form-label">담당 팀</label>
          <select id="f-team" class="form-select" onchange="updateKpiOptions()"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">연계 KPI 항목</label>
        <select id="f-kpi" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label" id="label-last">실적</label>
        <textarea id="f-last" class="form-textarea"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" id="label-this">계획</label>
        <textarea id="f-this" class="form-textarea"></textarea>
      </div>
      <div style="display:flex; gap:12px;">
        <button class="btn btn-primary" style="flex:2; padding:14px;" onclick="saveData()">데이터 저장</button>
        <button id="del-btn" class="btn" style="flex:1; background:var(--red); display:none; color:white;" onclick="deleteData()">삭제</button>
      </div>
    </div>
  </div>
</div>

<script>
const _0x4f12 = "a3BpYV9rcGlh"; const _0x9b88 = "a3BpMjAyNiE="; 
const TEAMS = ['기획홍보', '대외정책', '차트운영', '개발파트'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_LIST = {
  '기획홍보': ['신규 사업 개발', '협회 언론 대응', 'MWM 콘퍼런스', '브랜딩'],
  '대외정책': ['정책파트너십 강화', '이슈 공론화', '법안 입법관리', '정책 아이템 개발'],
  '차트운영': ['데이터 품질관리', '운영 효율화', '브랜딩', '수익 증대'],
  '개발파트': ['시스템 안정 운영', '시스템 개선', '시스템 클라우드 이전', '정산분배 런칭']
};

let currentYear = 2026;
let currentMonth = new Date().getMonth();
let currentView = 'input'; 
let db = JSON.parse(localStorage.getItem('kpi_task_db') || '[]');

function initSelectors() {
  const ySelect = document.getElementById('year-select');
  ySelect.innerHTML = "";
  for(let y = 2020; y <= 2030; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + "년";
    if(y === currentYear) opt.selected = true;
    ySelect.appendChild(opt);
  }

  const mSelect = document.getElementById('month-select');
  mSelect.innerHTML = MONTHS.map((m, i) => `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${m}</option>`).join('');
}

function handleLogin() {
  const id = document.getElementById('login-id').value;
  const pw = document.getElementById('login-pw').value;
  if (id === atob(_0x4f12) && pw === atob(_0x9b88)) {
    sessionStorage.setItem('kpi_auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initSelectors(); render();
  } else { document.getElementById('login-error').style.display = 'block'; }
}

function handleLogout() { sessionStorage.removeItem('kpi_auth'); location.reload(); }

window.onload = function() {
  if (sessionStorage.getItem('kpi_auth') === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initSelectors(); render();
  }
};

function changeYear(d) { setYear(currentYear + d); }
function setYear(y) {
  currentYear = parseInt(y);
  document.getElementById('year-select').value = currentYear;
  render();
}

function changeMonth(d) { setMonth(Math.max(0, Math.min(11, currentMonth + d))); }
function setMonth(m) {
  currentMonth = parseInt(m);
  document.getElementById('month-select').value = currentMonth;
  render();
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById('m-' + view).classList.add('active');
  document.getElementById('top-month-nav').style.display = (view === 'history') ? 'none' : 'flex';
  document.getElementById('top-team-filter').style.display = (view === 'history') ? 'block' : 'none';
  if(view === 'history') document.getElementById('history-team-select').innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  render();
}

function render() {
  if (sessionStorage.getItem('kpi_auth') !== 'true') return;
  const container = document.getElementById('main-content');
  // 연도와 월 필터링 (연도 데이터가 없는 이전 버전 호환을 위해 year가 없으면 2026으로 가정)
  const monthData = db.filter(item => (item.year || 2026) === currentYear && item.month === currentMonth);

  if (currentView === 'history') {
    const team = document.getElementById('history-team-select').value;
    let html = `<div style="max-width: 900px; margin: 0 auto;">`;
    for(let m = 0; m < 12; m++) {
      const data = db.filter(d => (d.year || 2026) === currentYear && d.month === m && d.team === team);
      if(data.length > 0) {
        html += `<div style="border-left:2px solid var(--accent); padding-left:20px; margin-bottom:30px;">
          <h3 style="color:var(--accent);">${MONTHS[m]}</h3><div class="grid-2">${data.map(d => `<div class="panel"><div class="panel-body">
            <div style="font-size:11px; color:var(--green); font-weight:700;">✓ 실적</div><div class="log-text">${d.lastDone}</div>
            <div style="font-size:11px; color:var(--accent); font-weight:700; margin-top:10px;">→ 계획</div><div class="log-text">${d.thisPlan}</div>
            <div class="kpi-tag">${d.kpi}</div></div></div>`).join('')}</div></div>`;
      }
    }
    container.innerHTML = html || '<div style="text-align:center; padding:50px;">데이터가 없습니다.</div>';
    return;
  }

  container.innerHTML = `<div class="grid-2">${TEAMS.map(team => {
    const teamData = monthData.filter(d => d.team === team);
    const title = `${team} ${MONTHS[currentMonth]}`;
    return `<div class="panel" style="border-top: 3px solid var(--color-${team});">
      <div class="panel-header"><span>${title}</span>${currentView==='input' ? `<button class="btn btn-primary" onclick="openModal(null, '${team}')">+ 등록</button>` : ''}</div>
      <div class="panel-body" style="${currentView==='log' ? 'display:grid; grid-template-columns: 1fr 1fr; gap:15px;' : ''}">
        ${currentView==='log' ? 
          `<div><div style="color:var(--green); font-size:11px; font-weight:700;">✓ 실적</div>${teamData.map(d=>`<div class="log-text" style="border-bottom:1px solid var(--border); padding:8px 0;">• ${d.lastDone}</div>`).join('') || '없음'}</div>
           <div><div style="color:var(--accent); font-size:11px; font-weight:700;">→ 계획</div>${teamData.map(d=>`<div class="log-text" style="border-bottom:1px solid var(--border); padding:8px 0;">• ${d.thisPlan}</div>`).join('') || '없음'}</div>` : 
          teamData.map(d => `<div class="log-card" style="border-left-color:var(--color-${team})" onclick="openModal('${d.id}')">
            <div class="log-text"><strong>실적:</strong> ${d.lastDone.substring(0,40)}...</div>
            <div class="kpi-tag" style="color:var(--color-${team})">${d.kpi}</div></div>`).join('') || '<div style="color:var(--text3); font-size:12px; text-align:center;">리스트 없음</div>'
        }
      </div></div>`;
  }).join('')}</div>`;
}

function openModal(id = null, teamHint = null) {
  document.getElementById('f-month').innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  document.getElementById('f-team').innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  if (id) {
    const d = db.find(x => x.id == id);
    document.getElementById('f-id').value = d.id;
    document.getElementById('f-month').value = d.month;
    document.getElementById('f-team').value = d.team;
    updateKpiOptions();
    document.getElementById('f-kpi').value = d.kpi;
    document.getElementById('f-last').value = d.lastDone;
    document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = '';
    document.getElementById('f-month').value = currentMonth;
    if(teamHint) document.getElementById('f-team').value = teamHint;
    updateKpiOptions();
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() {
  const m = parseInt(document.getElementById('f-month').value);
  document.getElementById('label-last').innerHTML = (m === 0 ? '12월' : m + '월') + ' 실적';
  document.getElementById('label-this').innerHTML = MONTHS[m] + ' 계획';
}

function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  document.getElementById('f-kpi').innerHTML = KPI_LIST[t].map(k => `<option value="${k}">${k}</option>`).join('');
}

function saveData() {
  const last = document.getElementById('f-last').value.trim();
  const plan = document.getElementById('f-this').value.trim();
  if (!last || !plan) return alert('내용을 입력해주세요.');
  const id = document.getElementById('f-id').value;
  const entry = { 
    id: id || Date.now(), 
    year: currentYear, 
    month: parseInt(document.getElementById('f-month').value), 
    team: document.getElementById('f-team').value, 
    kpi: document.getElementById('f-kpi').value, 
    lastDone: last, 
    thisPlan: plan 
  };
  if (id) db = db.map(d => d.id == id ? entry : d);
  else db.push(entry);
  localStorage.setItem('kpi_task_db', JSON.stringify(db));
  closeModal(); render();
}

function deleteData() {
  if (!confirm('삭제하시겠습니까?')) return;
  db = db.filter(d => d.id != document.getElementById('f-id').value);
  localStorage.setItem('kpi_task_db', JSON.stringify(db));
  closeModal(); render();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function downloadSelf() {
  const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `KMCA_KPI_${currentYear}_${currentMonth+1}.html`;
  a.click();
}
</script>
</body>
</html>

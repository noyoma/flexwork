<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA KPI 성과 관리 시스템</title>
<link rel="icon" type="image/png" href="https://www.k-mca.or.kr/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text2: #9ca3b0; --text3: #5c6275;
  --accent: #5b7cff; --accent2: #7b9aff;
  --orange: #ff6b00;
  --green: #22c55e; --red: #ef4444;
  --color-기획홍보: #ff9f0a; --color-대외정책: #ffd60a;
  --color-차트운영: #ff375f; --color-개발파트: #bf5af2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 50px; border-radius: 20px; width: 380px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }

/* 고화질 SVG 로고 스타일 */
.kpia-logo-svg { width: 105px; height: auto; display: block; margin: 0 auto 10px; }
.kpia-logo-svg text { font-family: 'Pretendard', sans-serif; font-weight: 900; fill: #ffffff; }
.kpia-logo-svg circle { fill: var(--orange); }

#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 150; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }

.logo-section { padding: 40px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.logo-sub { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 2px; margin-top: 5px; }

.nav { padding: 15px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 16px 24px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(91,124,255,0.1); color: var(--accent2); border-left-color: var(--accent); font-weight: 800; }

/* 상단바 레이아웃 (가운데 연도 배치) */
.topbar { 
  padding: 18px 30px; border-bottom: 1px solid var(--border); 
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; 
  background: var(--bg); position: sticky; top: 0; z-index: 100; 
}
.topbar h2 { font-size: 18px; font-weight: 800; }

.date-selectors { display: flex; gap: 15px; position: relative; }
.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); border: 1px solid var(--border); }
.grid-trigger:hover { border-color: var(--accent); }

.selector-grid-popup { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 1000; width: 260px; }
.grid-item { padding: 12px; text-align: center; border-radius: 6px; background: var(--bg3); cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }

.content { padding: 24px 30px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 24px; overflow: hidden; }
.panel-header { padding: 18px 22px; border-bottom: 1px solid var(--border); font-weight: 800; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }

/* 큰 사이즈 팀 선택 버튼 */
.history-team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 35px; }
.history-team-btn { padding: 20px; border-radius: 15px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-weight: 900; text-align: center; cursor: pointer; transition: 0.2s; font-size: 15px; }
.history-team-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(91, 124, 255, 0.3); }

/* KPI 테이블 정밀 세팅 */
.kpi-table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; }
.kpi-table th, .kpi-table td { padding: 14px 10px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: center; word-break: keep-all; line-height: 1.5; }
.kpi-table th { background: var(--bg3); color: var(--text3); font-weight: 700; }
.col-no { width: 45px; } .col-item { width: 160px; text-align: left !important; } .col-weight { width: 65px; } .col-goal { width: 180px; text-align: left !important; }

/* 트래킹 카드 */
.tracking-card { background: var(--bg3); border-radius: 12px; padding: 22px; margin-bottom: 12px; border-left: 5px solid var(--accent); cursor: pointer; transition: 0.2s; }
.tracking-card:hover { transform: translateX(8px); background: #252a40; }
.tracking-card.locked { cursor: default; opacity: 0.65; border-left-style: dotted; }

.btn-reg { background: var(--accent); color: white; padding: 8px 14px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(5px); }
.modal { background: var(--bg2); width: 620px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.5); overflow: hidden; }
.login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; color: var(--text); margin-bottom: 15px; outline: none; }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <svg class="kpia-logo-svg" viewBox="0 0 100 35">
      <text x="0" y="28" font-size="28">KPIA</text>
      <circle cx="85" cy="22" r="4.5" />
    </svg>
    <div style="font-size:16px; font-weight:900; margin-bottom:25px; color:var(--text); letter-spacing: 1px;">KPI PERFORMANCE LOGIN</div>
    <input type="text" id="login-id" class="login-input" placeholder="ID">
    <input type="password" id="login-pw" class="login-input" placeholder="PASSWORD">
    <button class="btn-reg" style="width:100%; padding:16px; font-size:14px;" onclick="handleLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <svg class="kpia-logo-svg" viewBox="0 0 100 35">
          <text x="0" y="28" font-size="28">KPIA</text>
          <circle cx="85" cy="22" r="4.5" />
        </svg>
        <div class="logo-sub">PERFORMANCE TRACKER</div>
        <button class="btn-reg" style="font-size:10px; margin-top:25px; width:100%; opacity:0.8;" onclick="exportToExcel()">📊 EXCEL EXPORT</button>
      </div>
      <div class="nav">
        <div id="m-tracking" class="nav-item active" onclick="showView('tracking')">📊 월별 트래킹</div>
        <div id="m-history" class="nav-item" onclick="showView('history')">📅 연간 누적 현황</div>
        <div id="m-kpilist" class="nav-item" onclick="showView('kpilist')">📋 KPI 한눈에 보기</div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 30px; color: var(--red);">🔓 LOGOUT</div>
      </div>
    </nav>

    <div class="main">
      <div class="topbar">
        <h2 id="page-title">월별 트래킹</h2>
        <div class="date-selectors" id="date-controls">
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div>
            <div id="year-grid" class="selector-grid-popup"></div>
          </div>
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div>
            <div id="month-grid" class="selector-grid-popup"></div>
          </div>
        </div>
        <div></div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="panel-header" style="padding:18px 25px;">
      <h3 id="modal-title" style="font-size:16px;">데이터 입력/수정</h3>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:24px;">✕</button>
    </div>
    <div class="modal-body" style="padding:28px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">대상 월</label><select id="f-month" class="login-input" style="margin-bottom:0;" onchange="updateModalLabels()"></select></div>
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">팀명</label><select id="f-team" class="login-input" style="margin-bottom:0;" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:25px;">
        <label style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">연계 KPI 지표</label>
        <select id="f-kpi" class="login-input" style="margin-bottom:0; border:1px solid var(--accent); font-weight:700; color:var(--accent2);"></select>
      </div>
      <div style="margin-bottom:25px;"><label id="label-last" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">실적</label><textarea id="f-last" class="login-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div style="margin-bottom:25px;"><label id="label-this" style="display:block; font-size:11px; color:var(--text3); margin-bottom:8px; font-weight:700;">계획</label><textarea id="f-this" class="login-input" style="height:110px; margin-bottom:0; line-height:1.6;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:12px;">
        <button class="btn-reg" style="flex:2; padding:16px;" onclick="saveData()">SAVE CHANGES</button>
        <button id="del-btn" class="btn-reg" style="flex:1; background:var(--red);" onclick="deleteData()">DELETE</button>
      </div>
      <div id="lock-msg" style="display:none; color:var(--red); font-size:13px; font-weight:700; text-align:center;">마감된 월은 수정이 불가합니다.</div>
    </div>
  </div>
</div>

<script>
/** 난독화 인증 (kpia_kpi / kpi2026!) **/
const _0xV1 = [108, 119, 110, 102, 88, 108, 119, 110];
const _0xV2 = [108, 119, 110, 53, 55, 53, 49, 38]; 
const _0xM = (a) => a.map(v => String.fromCharCode(v ^ 0x07)).join('');

function handleLogin() {
  const i = document.getElementById('login-id').value.toLowerCase();
  const p = document.getElementById('login-pw').value;
  if (i === _0xM(_0xV1) && p === _0xM(_0xV2)) {
    sessionStorage.setItem('k_auth_token', btoa(Date.now()));
    checkAuth();
  } else { alert("인증 실패"); }
}
function checkAuth() {
  if (sessionStorage.getItem('k_auth_token')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateDateDisplays(); render();
  }
}

const TEAMS = ['기획홍보', '대외정책', '차트운영', '개발파트'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KPI_DATA_FULL = {
  '기획홍보': [{ no:1, item:'신규 사업 개발', goal:'신규 사업 런칭', weight:0.35, s:'300점↑', a:'200-299', b:'100-199', c:'100↓' }, { no:2, item:'협회 언론 대응', goal:'보도자료 배포', weight:0.25, s:'16건↑', a:'13-15', b:'10-12', c:'9↓' }, { no:'보조', item:'최소 보도량 달성률', goal:'보조지표', weight:0.05, s:'80%↑', a:'70-80', b:'60-70', c:'60↓' }, { no:3, item:'MWM 콘퍼런스', goal:'만족도 제고', weight:0.20, s:'90점↑', a:'80-90', b:'70-80', c:'70↓' }, { no:4, item:'써클차트 브랜딩', goal:'유입량 증가', weight:0.15, s:'30%↑', a:'15%', b:'0', c:'감소' }],
  '대외정책': [{ no:1, item:'정책파트너십 강화', goal:'파트너십 리포트', weight:0.2, s:'주 2회', a:'1.5회', b:'1회', c:'미달' }, { no:2, item:'이슈 공론화', goal:'공청회 개최', weight:0.3, s:'3건', a:'2건', b:'1건', c:'0건' }, { no:3, item:'법안 입법관리', goal:'입법 대응', weight:0.2, s:'2건↑', a:'1건', b:'0건', c:'마이너스' }, { no:4, item:'정책 아이템 개발', goal:'이슈 발굴', weight:0.3, s:'2건↑', a:'2건', b:'1건', c:'0건' }],
  '차트운영': [{ no:1, item:'클린 데이터 선행관리', goal:'오류 감소', weight:0.3, s:'20건↓', a:'26건', b:'32건', c:'38건' }, { no:2, item:'운영 효율화', goal:'업무량 감소', weight:0.3, s:'2.5FTE', a:'3.0', b:'3.5', c:'전년동일' }, { no:3, item:'브랜딩', goal:'유입 증가', weight:0.15, s:'30%↑', a:'15%', b:'0', c:'감소' }, { no:4, item:'파트너십 수익 증대', goal:'차트 매출', weight:0.25, s:'+25%', a:'+10%', b:'0%', c:'감소' }],
  '개발파트': [{ no:1, item:'시스템 안정 운영', goal:'장애복구/SOP', weight:0.3, s:'0건', a:'2h↓', b:'4h↓', c:'4h↑' }, { no:2, item:'시스템 개선', goal:'SLA 준수', weight:0.2, s:'4건↑', a:'3건', b:'2건', c:'1건↓' }, { no:3, item:'시스템 클라우드 이전', goal:'마일스톤', weight:0.25, s:'완료', a:'테스트', b:'기획서', c:'정체' }, { no:4, item:'정산분배 시스템 런칭', goal:'납기/안정화', weight:0.25, s:'0건', a:'3건↓', b:'적기', c:'지연' }]
};

let currentYear = 2026;
let currentMonth = new Date().getMonth();
let currentView = 'tracking';
let currentHistoryTeam = TEAMS[0];
let db = JSON.parse(localStorage.getItem('kpi_task_db') || '[]');

const rDate = new Date();
const rY = rDate.getFullYear();
const rM = rDate.getMonth();

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  const yg = document.getElementById('year-grid'); yg.innerHTML = "";
  for(let y=2024; y<=2030; y++) {
    const d = document.createElement('div'); d.className=`grid-item ${y===currentYear?'active':''}`; d.textContent=y+"년";
    d.onclick=(e)=>{e.stopPropagation();currentYear=y;updateDateDisplays();render();}; yg.appendChild(d);
  }
  document.getElementById('month-grid').innerHTML = MONTHS.map((m,i)=>`<div class="grid-item ${i===currentMonth?'active':''}" onclick="event.stopPropagation();currentMonth=${i};updateDateDisplays();render();">${m}</div>`).join('');
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const target = document.getElementById('m-' + view);
  if(target) target.classList.add('active');
  document.getElementById('page-title').textContent = view === 'history' ? '연간 누적 현황' : (view === 'kpilist' ? 'KPI 한눈에 보기' : '월별 트래킹');
  document.getElementById('date-controls').style.display = (view === 'tracking') ? 'flex' : 'none';
  render();
}

function render() {
  if (!sessionStorage.getItem('k_auth_token')) return;
  const container = document.getElementById('main-content');
  const isPast = (currentYear < rY) || (currentYear === rY && currentMonth < rM);

  if (currentView === 'kpilist') {
    container.innerHTML = TEAMS.map(team => `
      <div class="panel">
        <div class="panel-header"><strong style="color:var(--color-${team})">${team} KPI 지표 가이드</strong></div>
        <div class="panel-body kpi-table-container">
          <table class="kpi-table">
            <thead>
              <tr><th class="col-no">NO</th><th class="col-item">항목</th><th class="col-weight">가중치</th><th class="col-goal">목표</th><th>S</th><th>A</th><th>B</th><th>C</th></tr>
            </thead>
            <tbody>${KPI_DATA_FULL[team].map(k => `<tr><td>${k.no}</td><td style="font-weight:700; color:var(--text); text-align:left;">${k.item}</td><td style="color:var(--orange); font-weight:700;">${Math.round(k.weight*100)}%</td><td style="text-align:left;">${k.goal}</td><td>${k.s}</td><td>${k.a}</td><td>${k.b}</td><td>${k.c}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`).join('');
    return;
  }

  if (currentView === 'history') {
    let html = `<div style="max-width: 1100px; margin: 0 auto;"><div class="history-team-grid">${TEAMS.map(t => `<div class="history-team-btn ${t === currentHistoryTeam ? 'active' : ''}" onclick="currentHistoryTeam='${t}';render();">${t}</div>`).join('')}</div>`;
    for(let m = 0; m < 12; m++) {
      const data = db.filter(d => (d.year || 2026) === currentYear && d.month === m && d.team === currentHistoryTeam);
      const isLocked = (currentYear < rY) || (currentYear === rY && m < rM);
      const prevM = m === 0 ? '12월' : m + '월';
      if(data.length > 0) {
        html += `<div style="border-left:3px solid var(--orange); padding-left:25px; margin-bottom:40px;">
          <h3 style="color:var(--orange); margin-bottom:20px; font-size:20px; font-weight:900;">${MONTHS[m]} 성과 기록</h3>
          <div class="grid-2">${data.map(d => {
            const kpi = KPI_DATA_FULL[currentHistoryTeam].find(k => k.item === d.kpi);
            return `<div class="panel" style="${isLocked ? 'opacity:0.8;' : ''}">
              <div class="panel-header" style="border-bottom:none;">
                <span style="color:var(--accent2); font-weight:900; font-size:14px; border-bottom:1px solid var(--border); width:100%; display:block; padding-bottom:8px;">${d.kpi} <span style="opacity:0.5; font-size:11px;">(${Math.round((kpi?kpi.weight:0)*100)}%)</span></span>
              </div>
              <div class="panel-body" onclick="${isLocked ? '' : `openModal('${d.id}')`}" style="cursor:${isLocked ? 'default' : 'pointer'}; padding-top:10px;">
                <div style="margin-bottom:15px;"><div style="font-size:11px; color:var(--green); font-weight:700; margin-bottom:5px;">✓ ${prevM} 실적</div><div style="font-size:13px; line-height:1.6;">${d.lastDone}</div></div>
                <div><div style="font-size:11px; color:var(--accent); font-weight:700; margin-bottom:5px;">→ ${MONTHS[m]} 계획</div><div style="font-size:13px; line-height:1.6;">${d.thisPlan}</div></div>
              </div></div>`;
          }).join('')}</div></div>`;
      }
    }
    container.innerHTML = html + "</div>";
    return;
  }

  const monthData = db.filter(d => (d.year || 2026) === currentYear && d.month === currentMonth);
  const pName = currentMonth === 0 ? '12월' : currentMonth + '월';
  container.innerHTML = `<div class="grid-2">${TEAMS.map(team => `
    <div class="panel" style="border-top: 3px solid var(--color-${team});">
      <div class="panel-header"><span>${team} ${MONTHS[currentMonth]}</span><button class="btn-reg" onclick="openModal(null, '${team}')">+ 등록</button></div>
      <div class="panel-body">
        ${KPI_DATA_FULL[team].map(k => {
          const entry = monthData.find(d => d.team === team && d.kpi === k.item);
          return `<div class="tracking-card ${isPast ? 'locked' : ''}" style="border-left-color:var(--color-${team})" onclick="${isPast ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}')`}">
            <div class="kpi-title-box">${k.item} <span style="font-weight:400; opacity:0.5; font-size:11px;">(${Math.round(k.weight*100)}%)</span></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; font-size:12px;">
              <div><span style="color:var(--green); font-weight:700; display:block; margin-bottom:4px;">${pName} 실적:</span>${entry?entry.lastDone:'-'}</div>
              <div><span style="color:var(--accent); font-weight:700; display:block; margin-bottom:4px;">${MONTHS[currentMonth]} 계획:</span>${entry?entry.thisPlan:'-'}</div>
            </div>
          </div>`;
        }).join('')}
      </div></div>`).join('')}</div>`;
}

function openModal(id = null, teamHint = null, kpiHint = null) {
  const fMonth = document.getElementById('f-month'); const fTeam = document.getElementById('f-team');
  const lockMsg = document.getElementById('lock-msg'); const footer = document.getElementById('modal-footer');
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  if (id) {
    const d = db.find(x => String(x.id) === String(id));
    document.getElementById('f-id').value = d.id; fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.kpi;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = ''; fMonth.value = currentMonth; fTeam.value = teamHint;
    updateKpiOptions(); if(kpiHint) document.getElementById('f-kpi').value = kpiHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  const isLocked = (currentYear < rY) || (currentYear === rY && parseInt(fMonth.value) < rM);
  footer.style.display = isLocked ? 'none' : 'flex'; lockMsg.style.display = isLocked ? 'block' : 'none';
  updateModalLabels(); document.getElementById('modal').style.display = 'flex';
}

function updateModalLabels() { const m = parseInt(document.getElementById('f-month').value); document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 실적`; document.getElementById('label-this').innerHTML = `${MONTHS[m]} 계획`; }
function updateKpiOptions() { const t = document.getElementById('f-team').value; document.getElementById('f-kpi').innerHTML = KPI_DATA_FULL[t].map(k => `<option value="${k.item}">${k.item}</option>`).join(''); }

function saveData() {
  const id = document.getElementById('f-id').value || Date.now();
  const entry = { id, year: currentYear, month: parseInt(document.getElementById('f-month').value), team: document.getElementById('f-team').value, kpi: document.getElementById('f-kpi').value, lastDone: document.getElementById('f-last').value, thisPlan: document.getElementById('f-this').value };
  db = db.filter(d => String(d.id) !== String(id)); db.push(entry);
  localStorage.setItem('kpi_task_db', JSON.stringify(db));
  currentMonth = entry.month; updateDateDisplays(); closeModal(); render();
}

function deleteData() { if(confirm('삭제하시겠습니까?')) { db = db.filter(d => String(d.id) !== String(document.getElementById('f-id').value)); localStorage.setItem('kpi_task_db', JSON.stringify(db)); closeModal(); render(); } }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleLogout() { sessionStorage.removeItem('k_auth_status'); location.reload(); }

function exportToExcel() {
  let csv = "Year,Month,Team,KPI,Result,Plan\n";
  db.sort((a,b)=>a.month - b.month).forEach(d => { csv += `${d.year || 2026},${d.month + 1},${d.team},"${d.kpi}","${d.lastDone.replace(/"/g, '""')}","${d.thisPlan.replace(/"/g, '""')}"\n`; });
  const b = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `KPIA_KPI_DATABASE_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

function togglePopup(e, id) { e.stopPropagation(); document.querySelectorAll('.selector-grid-popup').forEach(p => { if(p.id !== id) p.style.display = 'none'; }); const t = document.getElementById(id); t.style.display = t.style.display === 'grid' ? 'none' : 'grid'; }
function closeAllPopups(e) { if (!e.target.closest('.date-selectors')) document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }

window.onload = checkAuth;
</script>

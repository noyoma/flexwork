<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA KPI 성과 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text2: #9ca3b0; --text3: #5c6275;
  --accent: #5b7cff; --accent2: #7b9aff;
  --green: #22c55e; --red: #ef4444;
  --color-기획홍보: #ff9f0a; --color-대외정책: #ffd60a;
  --color-차트운영: #ff375f; --color-개발파트: #bf5af2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 화면 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 380px; text-align: center; }
.login-logo { width: 140px; margin-bottom: 20px; filter: brightness(0) invert(1); }
.btn-login { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }

/* 메인 레이아웃 */
#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 250px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }

/* 로고 영역 */
.logo-section { padding: 30px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.kpia-logo { width: 130px; height: auto; filter: brightness(0) invert(1); margin-bottom: 10px; }
.logo-sub { font-size: 11px; font-weight: 700; color: var(--accent2); letter-spacing: 2px; }

.nav { padding: 12px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 14px 20px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(91,124,255,0.1); color: var(--accent2); border-left-color: var(--accent); }

/* 상단바 */
.topbar { padding: 15px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.date-selectors { display: flex; gap: 12px; }
.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }

/* 그리드 팝업 */
.selector-grid-popup { position: absolute; top: 55px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; width: 260px; }
.grid-item { padding: 10px; text-align: center; border-radius: 6px; background: var(--bg3); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }

.content { padding: 24px 28px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 24px; overflow: hidden; }
.panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }

/* 월별 트래킹 카드 */
.tracking-card { background: var(--bg3); border-radius: 10px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s; }
.tracking-card:hover { transform: translateX(5px); background: var(--surface); }
.kpi-title-label { font-size: 12px; font-weight: 700; color: var(--accent2); margin-bottom: 10px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.tracking-content { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.tracking-text { font-size: 13px; line-height: 1.6; color: var(--text2); white-space: pre-wrap; }
.label-min { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }

/* KPI 테이블 */
.kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.kpi-table th { text-align: left; background: var(--bg3); color: var(--text3); padding: 12px 10px; font-weight: 600; border-bottom: 1px solid var(--border); }
.kpi-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text2); }
.kpi-weight { font-family: monospace; font-weight: 700; color: var(--accent2); }

.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
.btn-primary { background: var(--accent); color: white; }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); width: 600px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <img src="https://i.imgur.com/KPIA_LOGO_URL_PLACEHOLDER.png" class="login-logo" onerror="this.src='https://www.k-mca.or.kr/images/common/logo.png'">
    <div style="font-size:18px; font-weight:700; margin-bottom:24px; color:var(--text);">KPI PERFORMANCE SYSTEM</div>
    <input type="text" id="login-id" class="login-input" placeholder="아이디">
    <input type="password" id="login-pw" class="login-input" placeholder="비밀번호">
    <button class="btn-login" onclick="handleLogin()">로그인</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <img src="https://www.k-mca.or.kr/images/common/logo.png" class="kpia-logo">
        <div class="logo-sub">PERFORMANCE TRACKER</div>
      </div>
      <div class="nav">
        <div id="m-tracking" class="nav-item active" onclick="showView('tracking')">📊 월별 트래킹</div>
        <div id="m-kpilist" class="nav-item" onclick="showView('kpilist')">📋 KPI 한눈에 보기</div>
        <div id="m-history" class="nav-item" onclick="showView('history')">📅 연간 누적 현황</div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 20px; color: var(--red);">🔓 로그아웃</div>
      </div>
    </nav>

    <div class="main">
      <div class="topbar">
        <h2 id="page-title" style="font-size: 18px;">월별 트래킹</h2>
        
        <div class="date-selectors" id="date-controls">
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'year-grid')">
              <span id="display-year">2026</span>년 ▾
            </div>
            <div id="year-grid" class="selector-grid-popup"></div>
          </div>
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'month-grid')">
              <span id="display-month">4월</span> ▾
            </div>
            <div id="month-grid" class="selector-grid-popup"></div>
          </div>
        </div>

        <div id="top-team-filter" style="display:none;">
          <select id="history-team-select" class="btn" style="background:var(--bg3); color:var(--text);" onchange="render()"></select>
        </div>
      </div>
      
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title" style="font-size:15px;">업무 기록 입력/수정</h3>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:20px;">✕</button>
    </div>
    <div class="modal-body" style="padding:24px;">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">해당 월</label><select id="f-month" class="btn" style="width:100%; background:var(--bg3); color:var(--text); text-align:left;"></select></div>
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">팀명</label><select id="f-team" class="btn" style="width:100%; background:var(--bg3); color:var(--text); text-align:left;" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">연계 KPI 항목</label>
        <select id="f-kpi" class="btn" style="width:100%; background:var(--bg3); color:var(--text); text-align:left; border:1px solid var(--accent);"></select>
      </div>
      <div style="margin-bottom:20px;"><label id="label-last" style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">실적 (한 일)</label><textarea id="f-last" style="width:100%; height:100px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:12px; outline:none;"></textarea></div>
      <div style="margin-bottom:20px;"><label id="label-this" style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">계획 (할 일)</label><textarea id="f-this" style="width:100%; height:100px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:12px; outline:none;"></textarea></div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" style="flex:2; padding:14px;" onclick="saveData()">저장하기</button>
        <button id="del-btn" class="btn" style="flex:1; background:var(--red); display:none; color:white;" onclick="deleteData()">삭제</button>
      </div>
    </div>
  </div>
</div>

<script>
// 인증 및 기본 데이터
const _0x4f12 = "S1BJQV9LUEk="; const _0x9b88 = "S1BJMjAyNiE=";
const TEAMS = ['기획홍보', '대외정책', '차트운영', '개발파트'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const KPI_DATA_FULL = {
  '기획홍보': [
    { no:1, type:'지표', item:'신규 사업 개발', goal:'신규 사업 런칭', weight:0.35, s:'300점 이상', a:'200~299점', b:'100~199점', c:'100점 미만' },
    { no:2, type:'지표', item:'협회 언론 대응', goal:'보도자료 배포 증대', weight:0.25, s:'16건 이상', a:'13~15건', b:'10~12건', c:'9건 이하' },
    { no:3, type:'지표', item:'MWM 콘퍼런스', goal:'참가자 만족도 제고', weight:0.2, s:'90점 이상', a:'80~90점', b:'70~80점', c:'70점 미만' },
    { no:4, type:'지표', item:'써클차트 브랜딩', goal:'전월 대비 유입량 증가', weight:0.15, s:'30% 이상', a:'15%', b:'0', c:'전년 대비 감소' }
  ],
  '대외정책': [
    { no:1, type:'지표', item:'정책파트너십 강화', goal:'파트너십 리포트', weight:0.2, s:'주 2회', a:'주 1.5회', b:'주 1회', c:'주 1회 미달' },
    { no:2, type:'지표', item:'이슈 공론화', goal:'이슈 주도 공청회 개최', weight:0.3, s:'3', a:'2', b:'1', c:'0' },
    { no:3, type:'지표', item:'법안 입법관리', goal:'우호적 입법 대응', weight:0.2, s:'2 이상', a:'1', b:'0', c:'마이너스' },
    { no:4, type:'지표', item:'정책 아이템 개발', goal:'업계 이슈 발굴', weight:0.3, s:'2 이상', a:'2', b:'1', c:'0' }
  ],
  '차트운영': [
    { no:1, type:'지표', item:'클린 데이터 선행관리', goal:'오류 건수 감소', weight:0.3, s:'20건 이하', a:'26건', b:'32건', c:'38건' },
    { no:2, type:'지표', item:'운영 효율화', goal:'개인 업무량 감소', weight:0.3, s:'2.5 FTE', a:'3.0 FTE', b:'3.5 FTE', c:'전년 동일' },
    { no:3, type:'지표', item:'브랜딩', goal:'유입량 증가', weight:0.15, s:'30% 이상', a:'15%', b:'0', c:'전년 대비 감소' },
    { no:4, type:'지표', item:'파트너십 수익 증대', goal:'차트 데이터 매출 증대', weight:0.25, s:'+25%', a:'+10%', b:'0%', c:'전년 대비 감소' }
  ],
  '개발파트': [
    { no:1, type:'지표형', item:'시스템 안정 운영', goal:'MTTR 50% + SOP 50%', weight:0.3, s:'장애 0건', a:'2시간 이내', b:'4시간 이내', c:'4시간 초과' },
    { no:2, type:'지표형', item:'시스템 개선', goal:'SLA 85% 이상', weight:0.2, s:'4건+90%', a:'3건+85%', b:'2건', c:'1건 이하' },
    { no:3, type:'프로젝트형', item:'시스템 클라우드 이전', goal:'마일스톤 달성', weight:0.25, s:'1차 이전 완료', a:'테스트 착수', b:'기획서 완성', c:'정체' },
    { no:4, type:'프로젝트형', item:'정산분배 시스템 런칭', goal:'납기 및 안정화', weight:0.25, s:'장애 0건', a:'장애 3건 이하', b:'적기 납기', c:'납기 지연' }
  ]
};

let currentYear = 2026;
let currentMonth = 3; // 4월
let currentView = 'tracking';
let db = JSON.parse(localStorage.getItem('kpi_task_db') || '[]');

function togglePopup(e, id) {
  e.stopPropagation();
  const target = document.getElementById(id);
  const isVisible = target.style.display === 'grid';
  document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none');
  target.style.display = isVisible ? 'none' : 'grid';
}

function closeAllPopups(e) {
  if (!e.target.closest('.date-selectors')) {
    document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none');
  }
}

function initDateGrids() {
  const yGrid = document.getElementById('year-grid');
  yGrid.innerHTML = "";
  for(let y = 2024; y <= 2030; y++) {
    const div = document.createElement('div');
    div.className = `grid-item ${y === currentYear ? 'active' : ''}`;
    div.textContent = y + "년";
    div.onclick = () => { currentYear = y; updateDateDisplays(); render(); };
    yGrid.appendChild(div);
  }
  const mGrid = document.getElementById('month-grid');
  mGrid.innerHTML = MONTHS.map((m, i) => `<div class="grid-item ${i === currentMonth ? 'active' : ''}" onclick="currentMonth=${i}; updateDateDisplays(); render();">${m}</div>`).join('');
}

function updateDateDisplays() {
  document.getElementById('display-year').textContent = currentYear;
  document.getElementById('display-month').textContent = MONTHS[currentMonth];
  initDateGrids();
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById('m-' + view).classList.add('active');
  document.getElementById('date-controls').style.display = (view === 'history') ? 'none' : 'flex';
  document.getElementById('top-team-filter').style.display = (view === 'history') ? 'block' : 'none';
  if(view === 'history') document.getElementById('history-team-select').innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  render();
}

function render() {
  const container = document.getElementById('main-content');
  if (currentView === 'kpilist') {
    container.innerHTML = TEAMS.map(team => `
      <div class="panel">
        <div class="panel-header"><strong style="color:var(--color-${team})">${team} KPI 지표 현황</strong></div>
        <div class="panel-body">
          <table class="kpi-table">
            <thead><tr><th>NO</th><th>항목</th><th>가중치</th><th>목표</th><th>S</th><th>A</th><th>B</th><th>C</th></tr></thead>
            <tbody>${KPI_DATA_FULL[team].map(k => `
              <tr><td>${k.no}</td><td style="font-weight:700">${k.item}</td><td class="kpi-weight">${k.weight}</td><td>${k.goal}</td>
              <td>${k.s}</td><td>${k.a}</td><td>${k.b}</td><td>${k.c}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`).join('');
    return;
  }

  const monthData = db.filter(d => (d.year || 2026) === currentYear && d.month === currentMonth);
  if (currentView === 'tracking') {
    container.innerHTML = `<div class="grid-2">${TEAMS.map(team => {
      const teamKpis = KPI_DATA_FULL[team];
      return `<div class="panel" style="border-top:3px solid var(--color-${team})">
        <div class="panel-header"><span>${team} ${MONTHS[currentMonth]} 트래킹</span><button class="btn btn-primary" onclick="openModal(null, '${team}')">+ 등록</button></div>
        <div class="panel-body">
          ${teamKpis.map(k => {
            const entry = monthData.find(d => d.team === team && d.kpi === k.item);
            return `<div class="tracking-card" style="border-left-color:var(--color-${team})" onclick="${entry ? `openModal('${entry.id}')` : `openModal(null, '${team}', '${k.item}')`}">
              <span class="kpi-title-label">${k.item}</span>
              <div class="tracking-content">
                <div><div class="label-min">실적</div><div class="tracking-text">${entry ? entry.lastDone : '기록 없음'}</div></div>
                <div><div class="label-min">계획</div><div class="tracking-text">${entry ? entry.thisPlan : '계획 없음'}</div></div>
              </div>
            </div>`;
          }).join('')}
        </div></div>`;
    }).join('')}</div>`;
  }
  // history 로직 생략(기존과 동일)
}

function handleLogin() {
  const id = document.getElementById('login-id').value;
  const pw = document.getElementById('login-pw').value;
  if (id === atob(_0x4f12) && pw === atob(_0x9b88)) {
    sessionStorage.setItem('kpi_auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateDateDisplays(); render();
  } else { alert("인증 실패"); }
}

function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  document.getElementById('f-kpi').innerHTML = KPI_DATA_FULL[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('');
}

function openModal(id = null, teamHint = null, kpiHint = null) {
  const fMonth = document.getElementById('f-month');
  const fTeam = document.getElementById('f-team');
  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  if (id) {
    const d = db.find(x => x.id == id);
    document.getElementById('f-id').value = d.id;
    fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.kpi;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
  } else {
    document.getElementById('f-id').value = '';
    fMonth.value = currentMonth; fTeam.value = teamHint;
    updateKpiOptions(); if(kpiHint) document.getElementById('f-kpi').value = kpiHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  document.getElementById('modal').style.display = 'flex';
}

function saveData() {
  const entry = { id: document.getElementById('f-id').value || Date.now(), year: currentYear, month: parseInt(document.getElementById('f-month').value), team: document.getElementById('f-team').value, kpi: document.getElementById('f-kpi').value, lastDone: document.getElementById('f-last').value, thisPlan: document.getElementById('f-this').value };
  db = db.filter(d => d.id != entry.id); db.push(entry);
  localStorage.setItem('kpi_task_db', JSON.stringify(db));
  closeModal(); render();
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleLogout() { sessionStorage.removeItem('kpi_auth'); location.reload(); }
function downloadSelf() {
  const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `KPIA_KPI_TRACKER.html`; a.click();
}
</script>

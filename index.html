<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIA KPI 성과 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
  --surface: #1e2235; --border: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text2: #9ca3b0; --text3: #5c6275;
  --accent: #5b7cff; --accent2: #7b9aff;
  --orange: #ff6b00;
  --green: #22c55e; --red: #ef4444;
  --color-기획홍보: #ff9f0a; --color-대외정책: #ffd60a;
  --color-차트운영: #ff375f; --color-개발파트: #bf5af2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; height: 100vh; overflow: hidden; }

/* 로그인 화면 */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.login-box { background: var(--bg2); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 360px; text-align: center; }
.login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); margin-bottom: 12px; outline: none; }
.btn-login { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }

/* 메인 앱 레이아웃 */
#main-app { display: none; height: 100vh; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; }

/* 로고 섹션 - 선명도 강화 */
.logo-section { padding: 30px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.kpia-logo { 
  width: 140px; height: auto; 
  filter: brightness(0) invert(1); 
  image-rendering: -webkit-optimize-contrast; /* 선명도 개선 */
  margin-bottom: 10px;
}
.logo-sub { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 2px; }

.nav { padding: 12px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 14px 20px; font-size: 14px; color: var(--text2); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(91,124,255,0.1); color: var(--accent2); border-left-color: var(--accent); font-weight: 700; }

/* 상단바 */
.topbar { padding: 15px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 50; }
.topbar-left-group { display: flex; align-items: center; gap: 20px; }

/* 팀 선택 그리드 (연간 누적에서만) */
.team-grid-selector { display: none; grid-template-columns: repeat(2, 1fr); gap: 6px; background: var(--bg3); padding: 4px; border-radius: 10px; }
.team-grid-item { padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text3); text-align: center; transition: 0.2s; }
.team-grid-item.active { background: var(--accent); color: white; }

.date-selectors { display: flex; gap: 12px; position: relative; }
.grid-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); }

.selector-grid-popup { position: absolute; top: 50px; left: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; width: 260px; }
.grid-item { padding: 10px; text-align: center; border-radius: 6px; background: var(--bg3); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); }
.grid-item.active { background: var(--accent); color: white; }

.content { padding: 24px 28px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 24px; overflow: hidden; }
.panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }

/* 트래킹 카드 */
.tracking-card { background: var(--bg3); border-radius: 10px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s; }
.tracking-card:hover { transform: translateX(5px); }
.tracking-card.locked { cursor: default; opacity: 0.8; border-left-style: dotted; }
.tracking-card.locked:hover { transform: none; }

.kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.kpi-table th { text-align: left; background: var(--bg3); color: var(--text3); padding: 12px 10px; }
.kpi-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }

/* 모달 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); width: 600px; border-radius: 12px; border: 1px solid var(--border); }
</style>
</head>
<body onclick="closeAllPopups(event)">

<div id="login-screen">
  <div class="login-box">
    <img src="https://www.k-mca.or.kr/images/common/logo.png" class="kpia-logo">
    <div style="font-size:18px; font-weight:700; margin-bottom:24px; color:var(--text);">KPI PERFORMANCE SYSTEM</div>
    <input type="text" id="login-id" class="login-input" placeholder="아이디">
    <input type="password" id="login-pw" class="login-input" placeholder="비밀번호">
    <button class="btn-login" onclick="handleLogin()">로그인</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-section">
        <img src="https://www.k-mca.or.kr/images/common/logo.png" class="kpia-logo">
        <div class="logo-sub">PERFORMANCE TRACKER</div>
      </div>
      <div class="nav">
        <div id="m-tracking" class="nav-item active" onclick="showView('tracking')">📊 월별 트래킹</div>
        <div id="m-kpilist" class="nav-item" onclick="showView('kpilist')">📋 KPI 한눈에 보기</div>
        <div id="m-history" class="nav-item" onclick="showView('history')">📅 연간 누적 현황</div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top: 20px; color: var(--red);">🔓 로그아웃</div>
      </div>
    </nav>

    <div class="main">
      <div class="topbar">
        <div class="topbar-left-group">
          <h2 id="page-title" style="font-size: 18px; min-width: 140px;">월별 트래킹</h2>
          <div id="team-grid-container" class="team-grid-selector"></div>
        </div>
        <div class="date-selectors" id="date-controls">
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'year-grid')"><span id="display-year">2026</span>년 ▾</div>
            <div id="year-grid" class="selector-grid-popup"></div>
          </div>
          <div style="position: relative;">
            <div class="grid-trigger" onclick="togglePopup(event, 'month-grid')"><span id="display-month">4월</span> ▾</div>
            <div id="month-grid" class="selector-grid-popup"></div>
          </div>
        </div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div id="modal-header" class="panel-header" style="padding:16px 20px;">
      <h3 id="modal-title" style="font-size:15px;">업무 기록</h3>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--text3); cursor:pointer; font-size:20px;">✕</button>
    </div>
    <div class="modal-body" style="padding:24px;" id="modal-content-area">
      <input type="hidden" id="f-id">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">해당 월</label><select id="f-month" class="login-input" style="margin-bottom:0;" onchange="updateModalLabels()"></select></div>
        <div><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">팀명</label><select id="f-team" class="login-input" style="margin-bottom:0;" onchange="updateKpiOptions()"></select></div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">연계 KPI 항목</label>
        <select id="f-kpi" class="login-input" style="margin-bottom:0; border:1px solid var(--accent);"></select>
      </div>
      <div style="margin-bottom:20px;"><label id="label-last" style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">실적</label><textarea id="f-last" class="login-input" style="height:100px; margin-bottom:0;"></textarea></div>
      <div style="margin-bottom:20px;"><label id="label-this" style="display:block; font-size:11px; color:var(--text3); margin-bottom:6px;">계획</label><textarea id="f-this" class="login-input" style="height:100px; margin-bottom:0;"></textarea></div>
      <div id="modal-footer" style="display:flex; gap:10px;">
        <button class="btn btn-primary" style="flex:2; padding:14px;" onclick="saveData()">저장하기</button>
        <button id="del-btn" class="btn" style="flex:1; background:var(--red); color:white;" onclick="deleteData()">삭제</button>
      </div>
      <div id="lock-msg" style="display:none; color:var(--red); font-size:12px; text-align:center;">마감된 월의 데이터는 수정할 수 없습니다.</div>
    </div>
  </div>
</div>

<script>
// 인증 정보 (소문자: kpia_kpi / kpi2026!)
const _0x4f12 = "a3BpYV9rcGk="; const _0x9b88 = "a3BpMjAyNiE=";

const TEAMS = ['기획홍보', '대외정책', '차트운영', '개발파트'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const KPI_DATA_FULL = {
  '기획홍보': [
    { no:1, item:'신규 사업 개발', goal:'신규 사업 런칭', weight:0.35, s:'300점 이상', a:'200~299점', b:'100~199점', c:'100점 미만' },
    { no:2, item:'협회 언론 대응', goal:'보도자료 배포 증대', weight:0.25, s:'16건 이상', a:'13~15건', b:'10~12건', c:'9건 이하' },
    { no:'보조', item:'최소 보도량 달성률', goal:'보조지표', weight:0.05, s:'80% 이상', a:'70~80%', b:'60~70%', c:'60% 미만' },
    { no:3, item:'MWM 콘퍼런스', goal:'참가자 만족도 제고', weight:0.20, s:'90점 이상', a:'80~90점', b:'70~80점', c:'70점 미만' },
    { no:4, item:'써클차트 브랜딩', goal:'전월 대비 유입량 증가', weight:0.15, s:'30% 이상', a:'15%', b:'0', c:'전년 대비 감소' }
  ],
  '대외정책': [
    { no:1, item:'정책파트너십 강화', goal:'파트너십 리포트', weight:0.2, s:'주 2회', a:'주 1.5회', b:'주 1회', c:'주 1회 미달' },
    { no:2, item:'이슈 공론화', goal:'공청회 개최', weight:0.3, s:'3건', a:'2건', b:'1건', c:'0건' },
    { no:3, item:'법안 입법관리', goal:'입법 대응', weight:0.2, s:'2건 이상', a:'1건', b:'0건', c:'마이너스' },
    { no:4, item:'정책 아이템 개발', goal:'정책 이슈 발굴', weight:0.3, s:'2건 이상', a:'2건', b:'1건', c:'0건' }
  ],
  '차트운영': [
    { no:1, item:'클린 데이터 선행관리', goal:'오류 건수 감소', weight:0.3, s:'20건 이하', a:'26건', b:'32건', c:'38건' },
    { no:2, item:'운영 효율화', goal:'개인 업무량 감소', weight:0.3, s:'2.5 FTE', a:'3.0 FTE', b:'3.5 FTE', c:'전년 동일' },
    { no:3, item:'브랜딩', goal:'유입량 증가', weight:0.15, s:'30% 이상', a:'15%', b:'0', c:'전년 대비 감소' },
    { no:4, item:'파트너십 수익 증대', goal:'차트 데이터 매출 증대', weight:0.25, s:'+25%', a:'+10%', b:'0%', c:'전년 대비 감소' }
  ],
  '개발파트': [
    { no:1, item:'시스템 안정 운영', goal:'장애 복구/SOP', weight:0.3, s:'장애 0건', a:'2시간 이내', b:'4시간 이내', c:'4시간 초과' },
    { no:2, item:'시스템 개선', goal:'SLA 준수', weight:0.2, s:'4건+90%', a:'3건+85%', b:'2건', c:'1건 이하' },
    { no:3, item:'시스템 클라우드 이전', goal:'마일스톤 달성', weight:0.25, s:'이전 완료', a:'테스트 착수', b:'기획서 완성', c:'정체' },
    { no:4, item:'정산분배 시스템 런칭', goal:'납기 및 안정화', weight:0.25, s:'장애 0건', a:'장애 3건 이하', b:'적기 납기', c:'지연' }
  ]
};

let currentYear = 2026;
let currentMonth = new Date().getMonth();
let currentView = 'tracking';
let currentHistoryTeam = TEAMS[0];
let db = JSON.parse(localStorage.getItem('kpi_task_db') || '[]');

const realNow = new Date();
const realY = realNow.getFullYear();
const realM = realNow.getMonth();

function handleLogin() {
  const id = document.getElementById('login-id').value.toLowerCase();
  const pw = document.getElementById('login-pw');
  if (id === atob(_0x4f12) && pw.value === atob(_0x9b88)) {
    sessionStorage.setItem('kpi_auth', 'true');
    checkAuth();
  } else { alert("계정 정보 불일치"); }
}

function checkAuth() {
  if (sessionStorage.getItem('kpi_auth') === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateDateDisplays();
    showView(currentView);
  }
}

function handleLogout() { sessionStorage.removeItem('kpi_auth'); location.reload(); }

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const activeNav = document.getElementById('m-' + view);
  if(activeNav) activeNav.classList.add('active');

  const dateControls = document.getElementById('date-controls');
  const teamGrid = document.getElementById('team-grid-container');
  const title = document.getElementById('page-title');

  if (view === 'history') {
    title.textContent = '연간 누적 현황';
    dateControls.style.display = 'none';
    teamGrid.style.display = 'grid';
    renderTeamGrid();
  } else {
    title.textContent = view === 'kpilist' ? 'KPI 한눈에 보기' : '월별 트래킹';
    dateControls.style.display = 'flex';
    teamGrid.style.display = 'none';
  }
  render();
}

function render() {
  const container = document.getElementById('main-content');
  if (currentView === 'kpilist') {
    container.innerHTML = TEAMS.map(team => `
      <div class="panel">
        <div class="panel-header"><strong style="color:var(--color-${team})">${team} KPI 가이드</strong></div>
        <div class="panel-body">
          <table class="kpi-table">
            <thead><tr><th>NO</th><th>항목</th><th>가중치</th><th>목표</th><th>S</th><th>A</th><th>B</th><th>C</th></tr></thead>
            <tbody>${KPI_DATA_FULL[team].map(k => `
              <tr><td>${k.no}</td><td style="font-weight:700">${k.item}</td><td style="color:var(--orange); font-weight:700;">${Math.round(k.weight*100)}%</td><td>${k.goal}</td>
              <td>${k.s}</td><td>${k.a}</td><td>${k.b}</td><td>${k.c}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`).join('');
    return;
  }

  if (currentView === 'history') {
    let html = `<div style="max-width: 900px; margin: 0 auto;"><h2 style="color:var(--accent2); margin-bottom:20px;">${currentHistoryTeam} ${currentYear}년 누적</h2>`;
    for(let m = 0; m < 12; m++) {
      const data = db.filter(d => (d.year || 2026) === currentYear && d.month === m && d.team === currentHistoryTeam);
      const isPast = (currentYear < realY) || (currentYear === realY && m < realM);
      if(data.length > 0) {
        html += `<div style="border-left:2px solid var(--orange); padding-left:20px; margin-bottom:30px;">
          <h3 style="color:var(--orange); margin-bottom:10px;">${MONTHS[m]}</h3>
          <div class="grid-2">${data.map(d => {
            const kpiInfo = KPI_DATA_FULL[currentHistoryTeam].find(k => k.item === d.kpi);
            const wTxt = kpiInfo ? `${Math.round(kpiInfo.weight*100)}%` : '';
            return `<div class="panel" style="${isPast ? 'opacity:0.8;' : ''}">
              <div class="panel-body" onclick="${isPast ? '' : `openModal('${d.id}')`}" style="cursor:${isPast ? 'default' : 'pointer'}">
                <div style="font-size:11px; color:var(--green); font-weight:700;">✓ ${m === 0 ? '12월' : m + '월'} 실적</div><div style="font-size:13px; margin-bottom:10px;">${d.lastDone}</div>
                <div style="font-size:11px; color:var(--accent); font-weight:700;">→ ${MONTHS[m]} 계획</div><div style="font-size:13px;">${d.thisPlan}</div>
                <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                  <span style="background:rgba(91,124,255,0.1); padding:2px 8px; border-radius:4px; font-size:10px; color:var(--accent2); font-weight:600;">${d.kpi}</span>
                  <span style="font-size:10px; color:var(--orange); font-weight:700;">가중치 ${wTxt}</span>
                </div>
              </div></div>`;
          }).join('')}</div></div>`;
      }
    }
    container.innerHTML = html + "</div>";
    return;
  }

  const monthData = db.filter(d => (d.year || 2026) === currentYear && d.month === currentMonth);
  const isPast = (currentYear < realY) || (currentYear === realY && currentMonth < realM);
  container.innerHTML = `<div class="grid-2">${TEAMS.map(team => `
    <div class="panel" style="border-top:3px solid var(--color-${team})">
      <div class="panel-header"><span>${team} ${MONTHS[currentMonth]} 트래킹</span></div>
      <div class="panel-body">
        ${KPI_DATA_FULL[team].map(k => {
          const entry = monthData.find(d => d.team === team && d.kpi === k.item);
          return `<div class="tracking-card ${isPast ? 'locked' : ''}" style="border-left-color:var(--color-${team})" onclick="${isPast ? '' : `openModal('${entry?entry.id:''}','${team}','${k.item}')`}">
            <div style="font-size:12px; font-weight:700; color:var(--accent2); margin-bottom:8px;">${k.item} <span style="color:var(--text3); font-weight:400; font-size:10px;">(${Math.round(k.weight*100)}%)</span></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:12px;">
              <div><span style="color:var(--green); font-weight:700;">${currentMonth === 0 ? '12월' : currentMonth + '월'} 실적:</span> ${entry?entry.lastDone:'-'}</div>
              <div><span style="color:var(--accent); font-weight:700;">${MONTHS[currentMonth]} 계획:</span> ${entry?entry.thisPlan:'-'}</div>
            </div>
          </div>`;
        }).join('')}
      </div></div>`).join('')}</div>`;
}

function openModal(id = null, teamHint = null, kpiHint = null) {
  const fMonth = document.getElementById('f-month');
  const fTeam = document.getElementById('f-team');
  const lockMsg = document.getElementById('lock-msg');
  const footer = document.getElementById('modal-footer');

  fMonth.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  fTeam.innerHTML = TEAMS.map(t => `<option value="${t}">${t}</option>`).join('');
  
  let targetM = currentMonth;
  if (id) {
    const d = db.find(x => x.id == id);
    document.getElementById('f-id').value = d.id;
    fMonth.value = d.month; fTeam.value = d.team;
    updateKpiOptions(); document.getElementById('f-kpi').value = d.kpi;
    document.getElementById('f-last').value = d.lastDone; document.getElementById('f-this').value = d.thisPlan;
    document.getElementById('del-btn').style.display = 'block';
    targetM = d.month;
  } else {
    document.getElementById('f-id').value = '';
    fMonth.value = currentMonth; fTeam.value = teamHint;
    updateKpiOptions(); if(kpiHint) document.getElementById('f-kpi').value = kpiHint;
    document.getElementById('f-last').value = ''; document.getElementById('f-this').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }

  const isPast = (currentYear < realY) || (currentYear === realY && targetM < realM);
  footer.style.display = isPast ? 'none' : 'flex';
  lockMsg.style.display = isPast ? 'block' : 'none';
  updateModalLabels();
  document.getElementById('modal').style.display = 'flex';
}

// 부가 기능 (기존 로직 유지)
function updateModalLabels() {
  const m = parseInt(document.getElementById('f-month').value);
  document.getElementById('label-last').innerHTML = `${m === 0 ? '12월' : m + '월'} 실적`;
  document.getElementById('label-this').innerHTML = `${MONTHS[m]} 계획`;
}
function updateKpiOptions() {
  const t = document.getElementById('f-team').value;
  document.getElementById('f-kpi').innerHTML = KPI_DATA_FULL[t].map(k => `<option value="${k.item}">${k.item}</option>`).join('');
}
function saveData() {
  const id = document.getElementById('f-id').value || Date.now();
  const entry = { id, year: currentYear, month: parseInt(document.getElementById('f-month').value), team: document.getElementById('f-team').value, kpi: document.getElementById('f-kpi').value, lastDone: document.getElementById('f-last').value, thisPlan: document.getElementById('f-this').value };
  db = db.filter(d => d.id != id); db.push(entry);
  localStorage.setItem('kpi_task_db', JSON.stringify(db));
  closeModal(); render();
}
function deleteData() { if(confirm('삭제?')) { db = db.filter(d => d.id != document.getElementById('f-id').value); localStorage.setItem('kpi_task_db', JSON.stringify(db)); closeModal(); render(); } }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function togglePopup(e, id) { e.stopPropagation(); document.querySelectorAll('.selector-grid-popup').forEach(p => { if(p.id !== id) p.style.display = 'none'; }); const t = document.getElementById(id); t.style.display = t.style.display === 'grid' ? 'none' : 'grid'; }
function closeAllPopups(e) { if (!e.target.closest('.date-selectors')) document.querySelectorAll('.selector-grid-popup').forEach(p => p.style.display = 'none'); }
function updateDateDisplays() { document.getElementById('display-year').textContent = currentYear; document.getElementById('display-month').textContent = MONTHS[currentMonth]; initGrids(); }
function initGrids() {
  const yg = document.getElementById('year-grid'); yg.innerHTML = "";
  for(let y=2024; y<=2030; y++) { const d = document.createElement('div'); d.className=`grid-item ${y===currentYear?'active':''}`; d.textContent=y+"년"; d.onclick=()=>{currentYear=y;updateDateDisplays();render();}; yg.appendChild(d); }
  document.getElementById('month-grid').innerHTML = MONTHS.map((m,i)=>`<div class="grid-item ${i===currentMonth?'active':''}" onclick="currentMonth=${i};updateDateDisplays();render();">${m}</div>`).join('');
}
function renderTeamGrid() { document.getElementById('team-grid-container').innerHTML = TEAMS.map(t=>`<div class="team-grid-item ${t===currentHistoryTeam?'active':''}" onclick="currentHistoryTeam='${t}';renderTeamGrid();render();">${t}</div>`).join(''); }

window.onload = checkAuth;
</script>
</body>
